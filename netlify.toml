[build]
  command = "npm run build"
  publish = "build"

# Redirects for Single Page Applications
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security Headers (Best Practice)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "upgrade-insecure-requests"
